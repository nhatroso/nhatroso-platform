name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Generate cache key
        id: cache-key
        run: echo "key=${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ steps.cache-key.outputs.key }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ steps.cache-key.outputs.key }}

      - run: pnpm install --frozen-lockfile

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run Validation (PR)
        if: github.event_name == 'pull_request'
        run: pnpm turbo run check --filter=...[origin/main]

      - name: Full Check (Push Main)
        if: github.event_name == 'push'
        run: pnpm turbo run check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build Affected (PR)
        if: github.event_name == 'pull_request'
        run: pnpm turbo run build --filter=...[origin/main]

      - name: Full Build (Push Main)
        if: github.event_name == 'push'
        run: pnpm turbo run build
